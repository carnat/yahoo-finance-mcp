app = "yahoo-finance-sec-facts"
primary_region = "iad"

[build]
dockerfile = "Dockerfile.sec-facts"

[env]
PORT = "8081"

[http_service]
internal_port = 8081
force_https = true
auto_stop_machines = false
auto_start_machines = true
min_machines_running = 1

[[vm]]
memory = "1gb"
cpu_kind = "shared"
cpus = 1
