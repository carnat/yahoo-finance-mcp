name = "yahoo-finance-mcp"
main = "src/index.ts"
compatibility_date = "2024-11-01"
preview_urls = true

[version_metadata]
binding = "CF_VERSION_METADATA"

[vars]
MCP_ENVELOPE_V2 = "true"
SERVER_VERSION = "1.4.1"
BUILD_DATE = "2026-06-18"
BUILD_SHA = ""
# Structured SEC facts use the official keyless data.sec.gov JSON APIs.
# Set this binding to "disabled" as a Worker secret to roll back.
STRUCTURED_FACT_PROVIDER = "official_sec_data_api"

# Smart Placement routes Worker execution to the Cloudflare PoP geographically
# closest to its outbound dependencies (e.g. data.sec.gov in US-East), which
# reduces latency and improves reliability of EDGAR fetch calls.
[placement]
mode = "smart"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
