name = "yahoo-finance-mcp"
main = "src/index.ts"
compatibility_date = "2024-11-01"

[vars]
MCP_ENVELOPE_V2 = "true"
SERVER_VERSION = "1.4.1"
BUILD_DATE = "2026-06-18"
BUILD_SHA = ""
# Set EDGAR_FACTS_URL after deploying the Python sidecar. Leave unset, or set
# STRUCTURED_FACT_PROVIDER = "disabled", to force structured fact rollback.
STRUCTURED_FACT_PROVIDER = "disabled"

# Smart Placement routes Worker execution to the Cloudflare PoP geographically
# closest to its outbound dependencies (e.g. data.sec.gov in US-East), which
# reduces latency and improves reliability of EDGAR fetch calls.
[placement]
mode = "smart"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
