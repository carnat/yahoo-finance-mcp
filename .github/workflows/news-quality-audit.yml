name: Arsenal News Quality Audit

on:
  schedule:
    - cron: "30 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run source-isolated Arsenal audit
        run: python scripts/audit_arsenal_news.py --output news-quality-audit.json
        continue-on-error: true

      - name: Upload audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: news-quality-audit
          path: news-quality-audit.json
          if-no-files-found: warn
