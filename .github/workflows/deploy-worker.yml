name: Deploy Cloudflare Worker

on:
  push:
    branches: [main]
    paths: ["worker/**", "server.py"]
  workflow_dispatch: # allow manual trigger from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: worker/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify tool lists are in sync
        run: python scripts/check_tool_sync.py

      - name: Install dependencies
        run: npm install
        working-directory: worker

      - name: Type-check
        run: npx tsc --noEmit
        working-directory: worker

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  smoke-test:
    name: Smoke-test deployed worker
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Wait for worker propagation
        run: sleep 10

      - name: Run end-to-end tool tests
        run: python scripts/test_tools.py --url https://yahoo-finance-mcp.artinatw.workers.dev/mcp
