name: Deploy Cloudflare Worker

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy-worker.yml"
      - "worker/**"
      - "server.py"
      - "yfmcp/**"
      - "tool_catalog.json"
      - "pyproject.toml"
      - "scripts/test_deployed_discovery.py"
      - "scripts/public_tool_contract.py"
      - "scripts/test_public_tool_contract.py"
      - "scripts/test_deployed_canaries.py"
      - "scripts/deployed_canaries.json"
      - "scripts/test_deployed_extractors.py"
      - "scripts/test_geographic_revenue_schema.py"
      - "scripts/test_smoke_architecture.py"
      - "scripts/stamp_worker_build.py"
      - "scripts/live_smoke_utils.py"
      - "scripts/test_tools.py"
      - "scripts/test_universal_aliases.py"
      - "scripts/test_thai_funds.py"
  workflow_dispatch: # allow manual trigger from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: deploy-worker-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: worker/package-lock.json

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Verify tool lists are in sync
        run: python scripts/check_tool_sync.py

      - name: Install dependencies
        run: npm ci
        working-directory: worker

      - name: Type-check
        run: npx tsc --noEmit
        working-directory: worker

      - name: Stamp Worker build metadata
        run: python scripts/stamp_worker_build.py
        env:
          BUILD_SHA: ${{ github.sha }}

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Wire optional FINNHUB_API_KEY as a Worker secret so it is available at runtime.
      # If not using CI, run manually: wrangler secret put FINNHUB_API_KEY
      - name: Wire FINNHUB_API_KEY secret
        run: |
          if [ -n "$FINNHUB_API_KEY" ]; then
            printf '%s' "$FINNHUB_API_KEY" | npx wrangler secret put FINNHUB_API_KEY
          fi
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}

      # Optional Thailand SEC Open Data key. Without it the public tools return
      # SOURCE_UNCONFIGURED with a recovery action and no credential detail.
      - name: Wire SEC_OPEN_DATA_API_KEY secret
        run: |
          if [ -n "$SEC_OPEN_DATA_API_KEY" ]; then
            printf '%s' "$SEC_OPEN_DATA_API_KEY" | npx wrangler secret put SEC_OPEN_DATA_API_KEY
          fi
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SEC_OPEN_DATA_API_KEY: ${{ secrets.SEC_OPEN_DATA_API_KEY }}

      - name: Wire TOOL_MODE
        run: |
          printf '%s' "$TOOL_MODE" | npx wrangler secret put TOOL_MODE
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TOOL_MODE: ${{ vars.TOOL_MODE || 'expanded' }}

  smoke-test:
    name: Smoke-test deployed worker
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: deploy
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Wait for worker propagation
        run: sleep 30

      - name: Verify deployed MCP contract canaries
        id: contract_canaries
        run: python scripts/test_deployed_canaries.py
        env:
          ALLOW_NETWORK_SKIP: "0"
          EXPECTED_TOOL_MODE: expanded

      - name: Audit deployed MCP live discovery
        id: live_discovery
        if: ${{ always() }}
        continue-on-error: true
        run: python scripts/test_deployed_discovery.py
        env:
          ALLOW_NETWORK_SKIP: "0"
          EXPECTED_TOOL_MODE: expanded
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}

      - name: Audit alias behavior
        id: aliases
        if: ${{ always() }}
        continue-on-error: true
        run: python scripts/test_universal_aliases.py

      - name: Audit geographic revenue schema
        id: geographic_revenue
        if: ${{ always() }}
        continue-on-error: true
        run: python scripts/test_geographic_revenue_schema.py
        env:
          GEO_SCHEMA_TARGET: remote
          MCP_URL: https://yahoo-finance-mcp.artinatw.workers.dev/mcp

      - name: Audit deployed extractor tools
        id: extractors
        if: ${{ always() }}
        continue-on-error: true
        run: python scripts/test_deployed_extractors.py
        env:
          MCP_URL: https://yahoo-finance-mcp.artinatw.workers.dev/mcp
          ALLOW_NETWORK_SKIP: "0"
          EXPECTED_TOOL_MODE: expanded

      - name: Audit deployed MCP grouped discovery
        id: grouped_discovery
        if: ${{ always() && vars.DEPLOY_GROUPED_SMOKE == 'true' }}
        continue-on-error: true
        run: python scripts/test_deployed_discovery.py
        env:
          ALLOW_NETWORK_SKIP: "0"
          EXPECTED_TOOL_MODE: grouped
          TOOL_MODE: grouped
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}

      - name: Audit deployed grouped extractor tools
        id: grouped_extractors
        if: ${{ always() && vars.DEPLOY_GROUPED_SMOKE == 'true' }}
        continue-on-error: true
        run: python scripts/test_deployed_extractors.py
        env:
          MCP_URL: https://yahoo-finance-mcp.artinatw.workers.dev/mcp
          ALLOW_NETWORK_SKIP: "0"
          EXPECTED_TOOL_MODE: grouped
          TOOL_MODE: grouped

      - name: Audit end-to-end tool tests
        id: end_to_end
        if: ${{ always() }}
        continue-on-error: true
        run: python scripts/test_tools.py --url https://yahoo-finance-mcp.artinatw.workers.dev/mcp

      - name: Summarize deployed smoke results
        if: ${{ always() }}
        run: |
          echo "## Deployed smoke results" >> "$GITHUB_STEP_SUMMARY"
          echo "| Suite | Outcome | Gate |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- | --- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Contract canaries | ${{ steps.contract_canaries.outcome }} | blocking |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Live discovery | ${{ steps.live_discovery.outcome }} | advisory |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Aliases | ${{ steps.aliases.outcome }} | advisory |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Geographic revenue | ${{ steps.geographic_revenue.outcome }} | advisory |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Extractors | ${{ steps.extractors.outcome }} | advisory |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Grouped discovery | ${{ steps.grouped_discovery.outcome }} | advisory |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Grouped extractors | ${{ steps.grouped_extractors.outcome }} | advisory |" >> "$GITHUB_STEP_SUMMARY"
          echo "| End-to-end tools | ${{ steps.end_to_end.outcome }} | advisory |" >> "$GITHUB_STEP_SUMMARY"
