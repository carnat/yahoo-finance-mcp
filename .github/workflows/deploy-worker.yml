name: Deploy Cloudflare Worker

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy-worker.yml"
      - "worker/**"
      - "server.py"
      - "pyproject.toml"
      - "scripts/test_deployed_discovery.py"
      - "scripts/test_deployed_extractors.py"
      - "scripts/test_geographic_revenue_schema.py"
      - "scripts/test_deployed_sec_facts_provider.py"
      - "scripts/live_smoke_utils.py"
      - "scripts/test_tools.py"
      - "scripts/test_universal_aliases.py"
  workflow_dispatch: # allow manual trigger from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: worker/package-lock.json

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Verify tool lists are in sync
        run: python scripts/check_tool_sync.py

      - name: Install dependencies
        run: npm install
        working-directory: worker

      - name: Type-check
        run: npx tsc --noEmit
        working-directory: worker

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Wire optional FINNHUB_API_KEY as a Worker secret so it is available at runtime.
      # If not using CI, run manually: wrangler secret put FINNHUB_API_KEY
      - name: Wire FINNHUB_API_KEY secret
        run: |
          if [ -n "$FINNHUB_API_KEY" ]; then
            printf '%s' "$FINNHUB_API_KEY" | npx wrangler secret put FINNHUB_API_KEY
          fi
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}

      - name: Wire SEC facts provider secrets
        run: |
          if [ -n "$EDGAR_FACTS_LAST_SMOKE_STATUS" ]; then
            printf '%s' "$EDGAR_FACTS_LAST_SMOKE_STATUS" | npx wrangler secret put EDGAR_FACTS_LAST_SMOKE_STATUS
          fi
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          EDGAR_FACTS_LAST_SMOKE_STATUS: ${{ vars.EDGAR_FACTS_LAST_SMOKE_STATUS }}

  smoke-test:
    name: Smoke-test deployed worker
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Wait for worker propagation
        run: sleep 30

      - name: Verify deployed MCP live discovery
        run: python scripts/test_deployed_discovery.py
        env:
          ALLOW_NETWORK_SKIP: "0"
          EXPECTED_TOOL_MODE: expanded
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}

      - name: Verify alias behavior
        run: python scripts/test_universal_aliases.py

      - name: Verify geographic revenue schema
        run: python scripts/test_geographic_revenue_schema.py
        env:
          GEO_SCHEMA_TARGET: remote
          MCP_URL: https://yahoo-finance-mcp.artinatw.workers.dev/mcp

      - name: Verify deployed extractor tools
        run: python scripts/test_deployed_extractors.py
        env:
          MCP_URL: https://yahoo-finance-mcp.artinatw.workers.dev/mcp
          ALLOW_NETWORK_SKIP: "0"
          EXPECTED_TOOL_MODE: expanded

      - name: Verify deployed Worker official SEC facts provider
        run: python scripts/test_deployed_sec_facts_provider.py
        env:
          MCP_URL: https://yahoo-finance-mcp.artinatw.workers.dev/mcp

      - name: Verify deployed MCP grouped discovery
        if: ${{ vars.DEPLOY_GROUPED_SMOKE == 'true' }}
        run: python scripts/test_deployed_discovery.py
        env:
          ALLOW_NETWORK_SKIP: "0"
          EXPECTED_TOOL_MODE: grouped
          TOOL_MODE: grouped
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}

      - name: Verify deployed grouped extractor tools
        if: ${{ vars.DEPLOY_GROUPED_SMOKE == 'true' }}
        run: python scripts/test_deployed_extractors.py
        env:
          MCP_URL: https://yahoo-finance-mcp.artinatw.workers.dev/mcp
          ALLOW_NETWORK_SKIP: "0"
          EXPECTED_TOOL_MODE: grouped
          TOOL_MODE: grouped

      - name: Run end-to-end tool tests
        run: python scripts/test_tools.py --url https://yahoo-finance-mcp.artinatw.workers.dev/mcp
