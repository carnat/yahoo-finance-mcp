name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-tool-sync:
    name: Verify tool lists in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Check server.py ↔ worker tool sync
        run: python scripts/check_tool_sync.py

  type-check-worker:
    name: Type-check Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: worker/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: worker

      - name: Type-check
        run: npx tsc --noEmit
        working-directory: worker

  acceptance-suite:
    name: Acceptance suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: worker/package-lock.json

      - name: Install worker deps
        run: npm ci
        working-directory: worker

      - name: Install Python deps
        run: pip install -e . pandas pydantic

      # ── 1. Fastest sanity gates (no deps) ────────────────────────────────
      - name: Python syntax check
        run: python -m py_compile server.py tool_groups.py yfmcp/*.py yfmcp/tools/*.py scripts/*.py

      - name: Python import check
        run: python -c "import server"

      - name: Tool sync
        run: python scripts/check_tool_sync.py

      - name: Workflow SDK version guard
        run: python scripts/test_workflow_sdk_versions.py

      - name: Deployed canary registry validation
        run: python scripts/test_deployed_canaries.py --validate-only

      - name: Deployed smoke architecture tests
        run: python -m unittest scripts.test_smoke_architecture -v

      - name: Company IR-page registry validation
        run: python scripts/test_ir_page_registry.py

      # ── 2. Core contracts: envelope, validation, security ─────────────────
      - name: MCP envelope tests
        run: python scripts/test_mcp_envelope.py

      - name: Input validation and security tests
        run: python scripts/test_input_validation.py

      # ── 3. Foundational helpers (used across all tools) ───────────────────
      - name: Helper utilities tests
        run: python scripts/test_helpers.py

      - name: Grouped-mode handler registry tests
        run: python scripts/test_grouped_registry.py

      - name: Worker grouped-mode routing tests
        run: python scripts/test_worker_grouped_mode.py

      - name: Worker SEC reliability tests
        run: python scripts/test_sec_reliability_worker.py

      - name: Thai SEC fund workflow tests
        run: python -m unittest scripts.test_thai_funds -v

      - name: Official SEC facts provider tests
        run: python -m unittest scripts.test_worker_sec_provider -v

      # ── 4. Infrastructure: cache layer ────────────────────────────────────
      - name: Cache layer tests
        run: python scripts/test_cache_layer.py

      # ── 5. Schema validation ──────────────────────────────────────────────
      - name: Public LLM tool contract tests
        run: python -m unittest scripts.test_public_tool_contract -v

      - name: Extractor schema tests
        run: python scripts/test_extractor_schemas.py

      # ── 6. Feature areas: manifest, news, earnings, options ───────────────
      - name: Manifest diagnostics and freshness tests
        run: python scripts/test_manifest_diagnostics.py

      - name: News and events tests
        run: python scripts/test_news_events.py

      - name: Earnings tools tests
        run: python scripts/test_earnings_tools.py

      - name: Options data quality tests
        run: python scripts/test_options_quality.py

      - name: Data quality regression tests
        run: python scripts/test_data_quality.py

      - name: Yahoo API coverage and routing tests
        run: python -m unittest scripts.test_yfinance_api_coverage -v

      # ── 7. Domain-specific schema tests ──────────────────────────────────
      - name: Source discovery schema tests
        run: python scripts/test_source_discovery_schema.py

      - name: Geographic revenue schema tests
        run: python scripts/test_geographic_revenue_schema.py

      # ── 8. Integration / alias routing (network-optional) ─────────────────
      - name: Universal alias payload handling tests
        run: python -m unittest scripts.test_universal_aliases_unit -v

      - name: Universal alias tests
        run: python scripts/test_universal_aliases.py
        env:
          ALLOW_NETWORK_SKIP: "1"

      # ── 9. Worker type-check (last: slowest step) ─────────────────────────
      - name: Worker type-check
        run: npx tsc --noEmit
        working-directory: worker
