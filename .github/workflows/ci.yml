name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-tool-sync:
    name: Verify tool lists in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Check server.py ↔ worker tool sync
        run: python scripts/check_tool_sync.py

  type-check-worker:
    name: Type-check Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: worker/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: worker

      - name: Type-check
        run: npx tsc --noEmit
        working-directory: worker

  acceptance-suite:
    name: Acceptance suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: worker/package-lock.json

      - name: Install worker deps
        run: npm ci
        working-directory: worker

      - name: Install Python deps
        run: pip install mcp yfinance pandas pydantic

      # ── 1. Fastest sanity gates (no deps) ────────────────────────────────
      - name: Python syntax check
        run: python -m py_compile server.py

      - name: Tool sync
        run: python scripts/check_tool_sync.py

      # ── 2. Core contracts: envelope, validation, security ─────────────────
      - name: Phase 1 tests (MCP envelope)
        run: python scripts/test_phase1.py

      - name: Phase 3 tests (input validation + security)
        run: python scripts/test_phase3.py

      # ── 3. Foundational helpers (used across all tools) ───────────────────
      - name: Helper utilities tests
        run: python scripts/test_helpers.py

      # ── 4. Infrastructure: cache layer ────────────────────────────────────
      - name: Phase 4 tests (cache)
        run: python scripts/test_phase4.py

      # ── 5. Schema validation ──────────────────────────────────────────────
      - name: Phase 3 extractor schema tests
        run: python scripts/test_phase3_extractors.py

      # ── 6. Feature areas: manifest, news, earnings, options ───────────────
      - name: Phase 8 tests (manifest diagnostics + freshness)
        run: python scripts/test_phase8.py

      - name: Phase 6B tests (multi-source news/events)
        run: python scripts/test_phase6b.py

      - name: Phase 5 tests (earnings tools)
        run: python scripts/test_phase5.py

      - name: Options data quality tests
        run: python scripts/test_options_quality.py

      # ── 7. Domain-specific schema tests ──────────────────────────────────
      - name: Source discovery schema tests
        run: python scripts/test_source_discovery_schema.py

      - name: Geographic revenue schema tests
        run: python scripts/test_geographic_revenue_schema.py

      # ── 8. Integration / alias routing (network-optional) ─────────────────
      - name: Universal alias tests
        run: python scripts/test_universal_aliases.py
        env:
          ALLOW_NETWORK_SKIP: "1"

      # ── 9. Worker type-check (last: slowest step) ─────────────────────────
      - name: Worker type-check
        run: npx tsc --noEmit
        working-directory: worker
