name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check-tool-sync:
    name: Verify tool lists in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check server.py ↔ worker tool sync
        run: python scripts/check_tool_sync.py

  type-check-worker:
    name: Type-check Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: worker/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: worker

      - name: Type-check
        run: npx tsc --noEmit
        working-directory: worker
