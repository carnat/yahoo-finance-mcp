name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-tool-sync:
    name: Verify tool lists in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Check server.py ↔ worker tool sync
        run: python scripts/check_tool_sync.py

  type-check-worker:
    name: Type-check Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: worker/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: worker

      - name: Type-check
        run: npx tsc --noEmit
        working-directory: worker

  acceptance-suite:
    name: Acceptance suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: worker/package-lock.json

      - name: Install worker deps
        run: npm ci
        working-directory: worker

      - name: Install Python deps
        run: pip install mcp yfinance pandas pydantic

      - name: Tool sync
        run: python scripts/check_tool_sync.py

      - name: Phase 1 tests
        run: python scripts/test_phase1.py

      - name: Phase 3 tests
        run: python scripts/test_phase3.py

      - name: Phase 3 extractor schema tests
        run: python scripts/test_phase3_extractors.py

      - name: Phase 4 tests
        run: python scripts/test_phase4.py

      - name: Phase 5 tests
        run: python scripts/test_phase5.py

      - name: Phase 6B tests
        run: python scripts/test_phase6b.py

      - name: Options data quality tests
        run: python scripts/test_options_quality.py

      - name: Universal alias tests
        run: python scripts/test_universal_aliases.py
        env:
          ALLOW_NETWORK_SKIP: "1"

      - name: Source discovery schema tests
        run: python scripts/test_source_discovery_schema.py

      - name: Geographic revenue schema tests
        run: python scripts/test_geographic_revenue_schema.py

      - name: Worker type-check
        run: npx tsc --noEmit
        working-directory: worker

      - name: Python syntax check
        run: python -m py_compile server.py
