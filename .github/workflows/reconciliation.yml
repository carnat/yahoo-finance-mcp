name: Weekly Tool Reconciliation

on:
  schedule:
    # Every Monday at 07:00 UTC
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read

env:
  # Force JavaScript-based marketplace actions to run on Node 24 runtime.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  reconcile:
    name: Reconcile tool manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Check tool sync (server.py ↔ tools.ts)
        run: python scripts/check_tool_sync.py

      - name: Validate workflow SDK versions
        run: python scripts/test_workflow_sdk_versions.py

      - name: Type-check worker
        working-directory: worker
        run: |
          npm ci --quiet
          npx tsc --noEmit

      - name: Syntax-check server.py
        run: python -m py_compile server.py
