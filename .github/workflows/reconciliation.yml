name: Weekly Tool Reconciliation

on:
  schedule:
    # Every Monday at 07:00 UTC
    - cron: "0 7 * * 1"
  workflow_dispatch:

jobs:
  reconcile:
    name: Reconcile tool manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check tool sync (server.py ↔ tools.ts)
        run: python scripts/check_tool_sync.py

      - name: Type-check worker
        working-directory: worker
        run: |
          npm ci --quiet
          npx tsc --noEmit

      - name: Syntax-check server.py
        run: python -m py_compile server.py
