name: Deploy SEC Facts Sidecar

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "Dockerfile.sec-facts"
      - "fly.sec-facts.toml"
      - "pyproject.toml"
      - "yfmcp/sec_facts_sidecar.py"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  FLY_APP_NAME: ${{ vars.SEC_FACTS_FLY_APP || 'yahoo-finance-sec-facts' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Configure SEC identity
        run: |
          if [ -n "$EDGAR_IDENTITY" ]; then
            flyctl secrets set EDGAR_IDENTITY="$EDGAR_IDENTITY" --app "$FLY_APP_NAME"
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          EDGAR_IDENTITY: ${{ secrets.EDGAR_IDENTITY }}

      - name: Deploy sidecar
        run: flyctl deploy --remote-only --config fly.sec-facts.toml --app "$FLY_APP_NAME"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Smoke sidecar health
        run: python -c "import json,urllib.request; print(json.load(urllib.request.urlopen('https://$FLY_APP_NAME.fly.dev/health', timeout=60)))"
